# =============================================================================
# StartBot — Docker Compose (Production-Grade)
# =============================================================================
# Usage:
#   docker-compose up --build
#
# Frontend: http://localhost:3000
# Backend:  http://localhost:8000/docs
# =============================================================================

services:
  # ── PostgreSQL Database ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: startbot-db
    environment:
      POSTGRES_USER: startbot
      POSTGRES_PASSWORD: startbot
      POSTGRES_DB: startbot
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - startbot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U startbot -d startbot"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ── Backend (FastAPI) ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: startbot-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://startbot:startbot@db:5432/startbot
      - HOST=0.0.0.0
      - PORT=8000
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - CHROMADB_PERSIST_DIR=/app/vector_store
    volumes:
      - vector-store:/app/vector_store
    networks:
      - startbot-network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import httpx; httpx.get('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ── Frontend (Next.js) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
        - NEXT_PUBLIC_APP_NAME=StartBot
    container_name: startbot-frontend
    ports:
      - "3000:3000"
    networks:
      - startbot-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

# ── Volumes ───────────────────────────────────────────────────────────────
volumes:
  postgres-data:
    driver: local
  vector-store:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────
networks:
  startbot-network:
    driver: bridge
